<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SentinelMesh — Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060a14;
    color: #e2e8f0;
    font-family: 'Inter', 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: rgba(12,18,32,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; }
  .topbar-logo .shield {
    width: 32px; height: 32px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .topbar-logo h1 { font-size: 16px; font-weight: 700; color: #f8fafc; }
  .topbar-logo span {
    font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
    background: rgba(16,185,129,0.15); color: #34d399;
    border: 1px solid rgba(16,185,129,0.25); border-radius: 4px;
    padding: 2px 6px; text-transform: uppercase;
  }
  .topbar-subtitle { font-size: 11px; color: #64748b; }

  .controls {
    display: flex; gap: 8px; align-items: center;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #94a3b8; border-radius: 6px; padding: 6px 12px;
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
  .zoom-label { font-size: 11px; color: #475569; font-mono: true; min-width: 42px; text-align: center; }

  /* ── CANVAS ── */
  #canvas-wrap {
    position: fixed; top: 57px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
  }
  #canvas-wrap:active { cursor: grabbing; }

  svg { width: 100%; height: 100%; }

  /* ── NODE STYLES ── */
  .node-card {
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.4));
    transition: filter 0.2s;
    cursor: pointer;
  }
  .node-card:hover { filter: drop-shadow(0 4px 32px rgba(0,0,0,0.6)) brightness(1.15); }

  .node-bg {
    rx: 12; ry: 12;
    stroke-width: 1.5;
  }

  /* Layer labels */
  .layer-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; fill: #334155; font-family: inherit;
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed; z-index: 200;
    background: rgba(15,23,36,0.97);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 12px 16px;
    font-size: 12px; color: #e2e8f0;
    max-width: 280px; pointer-events: none;
    opacity: 0; transition: opacity 0.15s;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tooltip.show { opacity: 1; }
  .tooltip h3 { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .tooltip p { font-size: 11px; color: #94a3b8; line-height: 1.5; }
  .tooltip .tag {
    display: inline-block; margin-top: 6px; margin-right: 4px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 2px 6px; font-size: 10px; color: #64748b;
  }

  /* ── LEGEND ── */
  .legend {
    position: fixed; bottom: 20px; left: 20px; z-index: 100;
    background: rgba(12,18,32,0.9); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 14px 16px; backdrop-filter: blur(8px);
    font-size: 11px;
  }
  .legend h4 { color: #475569; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 20px; height: 2px; flex-shrink: 0; }

  /* ── HINT ── */
  .hint {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: rgba(12,18,32,0.9); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 10px 14px; backdrop-filter: blur(8px);
    font-size: 10px; color: #475569;
    display: flex; flex-direction: column; gap: 4px;
  }
  .hint span { display: flex; align-items: center; gap: 6px; }

  /* pulse animation */
  @keyframes pulse-ring {
    0% { opacity: 0.8; r: 6; }
    100% { opacity: 0; r: 14; }
  }
  .pulse-ring { animation: pulse-ring 2s ease-out infinite; }

  @keyframes flow-dash {
    from { stroke-dashoffset: 24; }
    to { stroke-dashoffset: 0; }
  }
  .flow-path { animation: flow-dash 1.2s linear infinite; }
  .flow-path-slow { animation: flow-dash 2.5s linear infinite; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="shield">🛡</div>
    <div>
      <h1>SentinelMesh <span>Architecture</span></h1>
    </div>
  </div>
  <div class="topbar-subtitle">Cyber-Physical Defense Copilot — Powered by ASI-1 · Multi-Agent AI Pipeline</div>
  <div class="controls">
    <button class="ctrl-btn" onclick="resetView()">⊙ Reset View</button>
    <button class="ctrl-btn" onclick="zoomOut()">－</button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button class="ctrl-btn" onclick="zoomIn()">＋</button>
    <button class="ctrl-btn" onclick="toggleFlow()">⚡ Flow</button>
  </div>
</div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip">
  <h3 id="tt-title"></h3>
  <p id="tt-desc"></p>
  <div id="tt-tags"></div>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
<svg id="svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Glows -->
    <filter id="glow-blue"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-emerald"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-violet"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-red"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

    <!-- Gradients -->
    <linearGradient id="grad-source" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f1f38" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="grad-event" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d1f16" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="grad-agent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#180d2e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="grad-asi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e2a3f"/>
      <stop offset="100%" stop-color="#1a0e3f"/>
    </linearGradient>
    <linearGradient id="grad-tool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2208" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1f1204" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="grad-output" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f0e0e" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#120808" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6" opacity="0.7"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981" opacity="0.7"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6" opacity="0.7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b" opacity="0.7"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444" opacity="0.7"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════
       BACKGROUND LAYER BANDS
  ═══════════════════════════════════════════ -->
  <rect x="0" y="0" width="1600" height="1000" fill="#060a14"/>

  <!-- Grid dots -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.8" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- Layer bands -->
  <rect x="30" y="55" width="1540" height="155" rx="12" fill="rgba(59,130,246,0.03)" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <rect x="30" y="230" width="1540" height="130" rx="12" fill="rgba(16,185,129,0.03)" stroke="rgba(16,185,129,0.08)" stroke-width="1"/>
  <rect x="30" y="380" width="1540" height="200" rx="12" fill="rgba(139,92,246,0.04)" stroke="rgba(139,92,246,0.1)" stroke-width="1"/>
  <rect x="30" y="600" width="1540" height="145" rx="12" fill="rgba(245,158,11,0.03)" stroke="rgba(245,158,11,0.08)" stroke-width="1"/>
  <rect x="30" y="765" width="1540" height="210" rx="12" fill="rgba(239,68,68,0.03)" stroke="rgba(239,68,68,0.08)" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="50" y="80" class="layer-label">① Data Sources — Cyber-Physical Sensors</text>
  <text x="50" y="252" class="layer-label">② Event Processing — Telemetry Ingestion</text>
  <text x="50" y="403" class="layer-label">③ ASI-1 Multi-Agent Orchestration</text>
  <text x="50" y="622" class="layer-label">④ Security Tool Execution Layer</text>
  <text x="50" y="788" class="layer-label">⑤ Intelligence Output</text>

  <!-- ═══════════════════════════════════════════
       LAYER 1 — DATA SOURCES (y=90)
  ═══════════════════════════════════════════ -->

  <!-- IoT Camera -->
  <g class="node-card" data-title="IoT Camera Sensors" data-desc="IP cameras (cam-l1-01, cam-l2-01) monitoring facility zones. Detects motion, USB insertions, offline events, and firmware anomalies. Primary targets in cyber-physical attacks." data-tags="CVE-2024-3721,ONVIF,RTSP">
    <rect x="95" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="172" y="130" text-anchor="middle" font-size="22" dy="0">📷</text>
    <text x="172" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">IoT Cameras</text>
    <text x="172" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">cam-l1-01 · cam-l2-01</text>
    <!-- pulse -->
    <circle cx="232" cy="104" r="5" fill="#3b82f6" opacity="0.9"/>
    <circle class="pulse-ring" cx="232" cy="104" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

  <!-- Motion Sensors -->
  <g class="node-card" data-title="Motion & Presence Sensors" data-desc="PIR motion detectors covering server rooms, labs, and entry points. Provides physical presence confirmation — critical for correlating cyber events with physical intrusion." data-tags="PIR,Zone-Mapping,Physical-Intel">
    <rect x="310" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="387" y="130" text-anchor="middle" font-size="22">🚶</text>
    <text x="387" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">Motion Sensors</text>
    <text x="387" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">Zone coverage · PIR</text>
  </g>

  <!-- Access Control -->
  <g class="node-card" data-title="Badge & Access Control" data-desc="RFID/NFC badge readers on all restricted zones. Monitors access attempts, failed authentications, and tailgating. Key evidence source for insider threat detection." data-tags="RFID,Badge-Audit,Access-Log">
    <rect x="525" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="602" y="130" text-anchor="middle" font-size="22">🔐</text>
    <text x="602" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">Access Control</text>
    <text x="602" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">Badge · RFID · Zones</text>
  </g>

  <!-- Network Monitor -->
  <g class="node-card" data-title="Network Traffic Monitor" data-desc="Deep packet inspection on all network segments. Detects unknown devices (MAC anomalies), bandwidth spikes, data exfiltration, and lateral movement indicators." data-tags="DPI,IDS,MAC-Tracking,NetFlow">
    <rect x="740" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="817" y="130" text-anchor="middle" font-size="22">🌐</text>
    <text x="817" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">Network Monitor</text>
    <text x="817" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">DPI · MAC · NetFlow</text>
  </g>

  <!-- HVAC / Environment -->
  <g class="node-card" data-title="HVAC & Environmental Sensors" data-desc="Temperature, humidity, and smoke sensors for server rooms and cold storage. Monitors environmental hazards and equipment safety alongside cyber threats." data-tags="HVAC,Temp,Humidity,OSHA">
    <rect x="955" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="1032" y="130" text-anchor="middle" font-size="22">🌡️</text>
    <text x="1032" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">HVAC / Env</text>
    <text x="1032" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">Temp · Humidity · Smoke</text>
  </g>

  <!-- Smart Locks -->
  <g class="node-card" data-title="Smart Lock & Physical Security" data-desc="Electronic locks on server rooms, labs, and restricted areas. Monitors lock status, forced entry, and anomalous access patterns during off-hours." data-tags="BLE,Zigbee,Smart-Lock">
    <rect x="1170" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="1247" y="130" text-anchor="middle" font-size="22">🔒</text>
    <text x="1247" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">Smart Locks</text>
    <text x="1247" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">BLE · Zigbee · Entry</text>
  </g>

  <!-- External Threat Intel -->
  <g class="node-card" data-title="Threat Intelligence Feed" data-desc="External IP reputation, CVE database, and known APT indicators. Enriches local telemetry with global threat context for better attribution and severity scoring." data-tags="CVE,APT,MITRE,ThreatIntel">
    <rect x="1385" y="95" width="155" height="90" rx="10" fill="url(#grad-source)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="1462" y="130" text-anchor="middle" font-size="22">🛰️</text>
    <text x="1462" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd" font-family="inherit">Threat Intel</text>
    <text x="1462" y="170" text-anchor="middle" font-size="9" fill="#475569" font-family="inherit">CVE · APT · MITRE</text>
  </g>

  <!-- ═══════════════════════════════════════════
       CONNECTIONS: Sources → Event Stream
  ═══════════════════════════════════════════ -->
  <g class="flow-paths" opacity="0.7">
    <line x1="172" y1="185" x2="172" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
    <line x1="387" y1="185" x2="387" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
    <line x1="602" y1="185" x2="602" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
    <line x1="817" y1="185" x2="817" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
    <line x1="1032" y1="185" x2="1032" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
    <line x1="1247" y1="185" x2="1247" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
    <line x1="1462" y1="185" x2="1462" y2="240" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,4" class="flow-path" marker-end="url(#arrow-blue)"/>
  </g>

  <!-- ═══════════════════════════════════════════
       LAYER 2 — EVENT PROCESSING (y=245)
  ═══════════════════════════════════════════ -->

  <!-- Event Stream Bus -->
  <g class="node-card" data-title="Telemetry Event Stream" data-desc="Real-time ingestion pipeline collecting all sensor events. Normalizes heterogeneous data into TelemetryEvent schema with timestamps, zones, and device IDs. Buffers events for batch or real-time analysis." data-tags="Event-Bus,Normalization,Batching,Schema">
    <rect x="370" y="245" width="860" height="100" rx="12" fill="url(#grad-event)" stroke="rgba(16,185,129,0.45)" stroke-width="1.5" filter="url(#glow-emerald)"/>
    <text x="800" y="285" text-anchor="middle" font-size="14" font-weight="700" fill="#6ee7b7" font-family="inherit">📡  Telemetry Event Stream</text>
    <text x="800" y="308" text-anchor="middle" font-size="10" fill="#475569" font-family="inherit">Real-time ingestion · Schema normalization · Zone mapping · Timestamp correlation</text>
    <!-- event type pills -->
    <rect x="440" y="318" width="90" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="485" y="331" text-anchor="middle" font-size="9" fill="#6ee7b7" font-family="inherit">unknown_device</text>
    <rect x="545" y="318" width="80" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="585" y="331" text-anchor="middle" font-size="9" fill="#6ee7b7" font-family="inherit">data_transfer</text>
    <rect x="640" y="318" width="80" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="680" y="331" text-anchor="middle" font-size="9" fill="#6ee7b7" font-family="inherit">failed_login</text>
    <rect x="735" y="318" width="80" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="775" y="331" text-anchor="middle" font-size="9" fill="#6ee7b7" font-family="inherit">usb_inserted</text>
    <rect x="830" y="318" width="85" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="872" y="331" text-anchor="middle" font-size="9" fill="#6ee7b7" font-family="inherit">network_spike</text>
    <rect x="930" y="318" width="100" height="18" rx="4" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
    <text x="980" y="331" text-anchor="middle" font-size="9" fill="#6ee7b7" font-family="inherit">motion_detected</text>
    <!-- event count badge -->
    <circle cx="1200" cy="295" r="22" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.3)" stroke-width="1.5"/>
    <text x="1200" y="291" text-anchor="middle" font-size="14" font-weight="700" fill="#6ee7b7" font-family="inherit">7+</text>
    <text x="1200" y="305" text-anchor="middle" font-size="8" fill="#6ee7b7" font-family="inherit">Events</text>
  </g>

  <!-- Connection: Event stream → ASI-1 -->
  <line x1="800" y1="345" x2="800" y2="390" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,4" class="flow-path" marker-end="url(#arrow-violet)"/>

  <!-- ═══════════════════════════════════════════
       LAYER 3 — ASI-1 MULTI-AGENT (y=395)

</div>

<!-- HINT -->
<div class="hint">
  <span>🖱 Scroll to zoom</span>
  <span>✋ Drag to pan</span>
  <span>🖱 Click node for details</span>
</div>

<script>
// ── PAN & ZOOM ──
const wrap = document.getElementById('canvas-wrap');
const svg  = document.getElementById('svg');
let scale = 1, tx = 0, ty = 0;
let dragging = false, startX, startY, startTX, startTY;
let flowEnabled = true;

function applyTransform() {
  svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  svg.style.transformOrigin = '0 0';
  document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
}

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.12 : 0.89;
  const newScale = Math.min(Math.max(scale * delta, 0.2), 4);
  tx = mx - (mx - tx) * (newScale / scale);
  ty = my - (my - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.target.closest('.node-card')) return;
  dragging = true;
  startX = e.clientX; startY = e.clientY;
  startTX = tx; startTY = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTX + (e.clientX - startX);
  ty = startTY + (e.clientY - startY);
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);

function zoomIn()  { scale = Math.min(scale*1.2, 4);  applyTransform(); }
function zoomOut() { scale = Math.max(scale*0.8, 0.2); applyTransform(); }
function resetView() {
  scale=0.85; tx=0; ty=0; applyTransform();
  setTimeout(()=>{ tx=(wrap.offsetWidth - 1600*scale)/2; ty=(wrap.offsetHeight-1000*scale)/2; applyTransform(); }, 10);
}

// ── TOOLTIP ──
const tooltip = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttDesc  = document.getElementById('tt-desc');
const ttTags  = document.getElementById('tt-tags');

document.querySelectorAll('.node-card').forEach(node => {
  node.addEventListener('mouseenter', e => {
    const title = node.dataset.title || '';
    const desc  = node.dataset.desc  || '';
    const tags  = (node.dataset.tags || '').split(',').filter(Boolean);
    ttTitle.textContent = title;
    ttDesc.textContent  = desc;
    ttTags.innerHTML = tags.map(t=>`<span class="tag">${t}</span>`).join('');
    tooltip.classList.add('show');
  });
  node.addEventListener('mousemove', e => {
    tooltip.style.left = Math.min(e.clientX+16, window.innerWidth-300)+'px';
    tooltip.style.top  = Math.min(e.clientY-10, window.innerHeight-160)+'px';
  });
  node.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
});

// ── TOGGLE FLOW ANIMATION ──
function toggleFlow() {
  flowEnabled = !flowEnabled;
  document.querySelectorAll('.flow-path,.flow-path-slow').forEach(el => {
    el.style.animationPlayState = flowEnabled ? 'running' : 'paused';
  });
}

// ── INIT ──
window.addEventListener('load', () => {
  setTimeout(() => {
    scale = 0.82;
    tx = (wrap.offsetWidth  - 1600*scale) / 2;
    ty = (wrap.offsetHeight - 1000*scale) / 2 + 20;
    applyTransform();
  }, 50);
});
</script>
</body>
</html>
